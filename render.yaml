# Render blueprint

services:
  - type: web
    name: alex-tap-api-staging
    env: docker
    plan: starter
    branch: dev
    autoDeploy: true
    dockerContext: .
    dockerfilePath: ./apps/server/Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: staging
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        value: https://staging.alexkutsenko.dev
      - key: APP_PUBLIC_URL
        value: https://staging.alexkutsenko.dev
      - key: API_BASE_URL
        value: https://api-staging.alexkutsenko.dev
      - key: CORS_ORIGINS
        value: https://staging.alexkutsenko.dev
      - key: CHECKOUT_ALLOWED_ORIGINS
        value: https://staging.alexkutsenko.dev
      - key: KEYCLOAK_URL
        value: https://auth-staging.alexkutsenko.dev
      - key: KEYCLOAK_REALM
        value: alex-tap-staging
      - key: KEYCLOAK_ISSUER
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging
      - key: KEYCLOAK_AUTHORIZATION_ENDPOINT
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging/protocol/openid-connect/auth
      - key: KEYCLOAK_TOKEN_ENDPOINT
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging/protocol/openid-connect/token
      - key: KEYCLOAK_LOGOUT_ENDPOINT
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging/protocol/openid-connect/logout
      - key: KEYCLOAK_JWKS_URI
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging/protocol/openid-connect/certs
      - key: KEYCLOAK_CLIENT_ID
        value: web-app
      - key: API_AUDIENCE
        value: api
      - key: OIDC_REDIRECT_URI
        value: https://api-staging.alexkutsenko.dev/auth/callback
      - key: OIDC_LOGOUT_ENDPOINT
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging/protocol/openid-connect/logout
      - key: OIDC_POST_LOGOUT_REDIRECT_URI
        value: https://staging.alexkutsenko.dev/login
      - key: COOKIE_NAME_ACCESS
        value: accessToken
      - key: COOKIE_NAME_REFRESH
        value: refreshToken
      - key: PUBLIC_BOOKING_SUCCESS_URL
        value: https://staging.alexkutsenko.dev/payment/success
      - key: PUBLIC_BOOKING_CANCEL_URL
        value: https://staging.alexkutsenko.dev/payment/cancel
      - key: MANAGER_AUTO_MEMBERSHIP_COMPANY_ID
        value: demo-company
      - key: PUBLIC_DEMO_AUTO_PROVISION
        value: "true"
      - key: PUBLIC_DEMO_COMPANY_ID
        value: demo-company
      - key: NOTIFICATIONS_EMAIL_ENABLED
        value: "true"
      - key: EMAIL_PROVIDER
        value: resend
      - key: AI_BRIEFING_ENABLED
        value: "false"
      - key: AI_BRIEFING_MODEL
        value: gpt-5-mini
      - key: AI_BRIEFING_TIMEOUT_MS
        value: "6000"
      - key: AI_BRIEFING_CACHE_TTL_MS
        value: "300000"
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NOTIFY_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

