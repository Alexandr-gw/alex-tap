      - key: KEYCLOAK_TOKEN_ENDPOINT
        value: https://auth-staging.alexkutsenko.dev/realms/alex-tap-staging/protocol/openid-connect/token
      - key: KEYCLOAK_LOGOUT_ENDPOINT
