services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true".
        .
      KC_METRICS_ENABLED: "true"
      KC_PROXY: "edge"
    ports: ["8080:8080"]
    depends_on: [mailhog]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"  # UI
      - "1025:1025"  # SMTP
