name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build_test_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run -w client typecheck && npm run -w server typecheck
        continue-on-error: false

      - name: Lint client
        run: npm run -s client lint
        continue-on-error: false

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NODE_ENV: ${{ secrets.NODE_ENV || 'development' }}
        run: npm run -w client build && npm run -w server build

      - name: Dependency vulnerability scan
        run: npx audit-ci --low --moderate --high --critical
